<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relax Timer</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="top-controls">

  <!-- COLOR PICKER -->
  <input 
    type="color"
    id="colorPicker"
    value="#00aaff"
  >

  <!-- COLOR NAME INPUT -->
  <input
    type="text"
    id="colorName"
    placeholder="Enter Color"
  >

  <!-- COLOR SELECT -->
  <select id="colorSelect">

    <option value="">Select Color</option>

    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="green">Green</option>
    <option value="yellow">Yellow</option>
    <option value="orange">Orange</option>
    <option value="purple">Purple</option>
    <option value="pink">Pink</option>
    <option value="cyan">Cyan</option>
    <option value="white">White</option>
    <option value="black">Black</option>

  </select>

  <!-- TOGGLE -->
  <button
    onclick="toggleColorMode()"
    id="modeBtn"
  >
    TEXT COLOR
  </button>

<!-- IMAGE UPLOAD -->
<label class="upload-btn">

  ADD PHOTO

  <input
    type="file"
    id="imageUpload"
    accept="image/*"
    hidden
  >

</label>

</div>

<div class="container">

  <div class="title">RELAX TIMER</div>

  <div class="timer" id="timer">
    <div id="hours">00</div> :
    <div id="minutes">00</div> :
    <div id="seconds">00</div>
    <div class="ms" id="milliseconds">000</div>
  </div>

  <div class="labels">
    <span>Hours</span>
    <span>Minutes</span>
    <span>Seconds</span>
    <span>MS</span>
  </div>

  <div class="controls">

    <input type="number" id="hInput" placeholder="HH" min="0">
    <input type="number" id="mInput" placeholder="MM" min="0">
    <input type="number" id="sInput" placeholder="SS" min="0">

    <button onclick="focusMode()">FOCUS MODE</button>

    <button onclick="startTimer()">START</button>

    <button onclick="stopTimer()">STOP</button>

    <button onclick="resetTimer()">RESET</button>

    <button onclick="toggleTheme()">DARK/LIGHT</button>

    <button onclick="toggleLayout()">VERTICAL/HORIZONTAL</button>

  </div>

</div>

<!-- TIME OVER SCREEN -->
<div id="timeOverBox" class="time-over-box">
  <h1>TIME OVER</h1>
  <div id="completedTime">00:00:00</div>
</div>

<script src="script.js"></script>

</body>
</html>
